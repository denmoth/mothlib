# Publishes the main mod JAR (mothlib only, not testmod) to Modrinth + CurseForge.
# Requires repo Variables + Secrets (see docs/PUBLISHING.md).

name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version string (no "v"), must match release intent, e.g. 0.0.2'
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Gradle build
        uses: gradle/actions/setup-gradle@v4

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            V="${{ inputs.version }}"
          else
            R="${{ github.event.release.tag_name }}"
            V="${R#v}"
          fi
          echo "mod_version=$V" >> "$GITHUB_OUTPUT"
          echo "Building version: $V"

      - name: Build JAR
        run: ./gradlew build --no-daemon -Pmod_version="${{ steps.ver.outputs.mod_version }}"

      - name: Prepare changelog
        env:
          BODY: ${{ github.event_name == 'release' && github.event.release.body || '' }}
        run: |
          if [ "${{ github.event_name }}" = "release" ] && [ -n "${BODY}" ]; then
            printf '%s\n' "${BODY}" > publish-changelog.md
          else
            echo "Published via workflow_dispatch. See GitHub Releases for details." > publish-changelog.md
          fi

      - name: Publish to Modrinth & CurseForge
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: ${{ vars.MODRINTH_PROJECT_ID }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}

          curseforge-id: ${{ vars.CURSEFORGE_PROJECT_ID }}
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}

          files: build/libs/mothlib-*.jar

          name: MothLib
          version: ${{ steps.ver.outputs.mod_version }}
          version-type: release
          changelog-file: publish-changelog.md

          loaders: |
            forge
          game-versions: |
            1.20.1

          retry-attempts: 3
          retry-delay: 15000
